# ============================================================
# LOCAL DOCKER COMPOSE (CHATBOT + ENGINES)
# ============================================================

version: '2.4'

services:
  # Chatbot UI/API
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile.chatbot
    container_name: lego-chatbot
    ports:
      - "127.0.0.1:7860:7860"
    volumes:
      - ./data:/app/data:ro
      - ./log:/app/log
      - ./pmmOutputs:/app/pmmOutputs
      - ./src/extractor_outputs:/app/src/extractor_outputs
      # Allow container to control sibling containers if needed
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    networks:
      - chatbot_network
    restart: unless-stopped
    depends_on:
      - uppaal
      - extractor
    mem_limit: 8g
    mem_reservation: 4g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # UPPAAL Verification Engine
  # Build: cd src/uppaal && docker build --build-arg KEY=$UPPAAL_LICENSE_KEY --tag uppaal-engine -f res/Dockerfile .
  uppaal:
    image: uppaal-engine:latest
    container_name: uppaal-engine
    ports:
      - "2350:2350"
    volumes:
      - ./data/automaton:/home/uppaal/models:ro
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - USER=uppaal
      - UPPAAL_LEASE=1
    networks:
      - chatbot_network

  # Digital Twin Extractor Service
  extractor:
    build:
      context: ./src/DTLogExtSim/Extractor
    container_name: extractor-service
    volumes:   
      - uploads:/app/uploads
      - download:/app/download
      - ./src/extractor_outputs:/app/extractor
    ports:
      - "6662:6662"
    networks:
      - chatbot_network
    restart: unless-stopped

volumes:
  uploads:
  download:

networks:
  chatbot_network:
    driver: bridge
