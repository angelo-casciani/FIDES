# ============================================================
# SERVER DEPLOYMENT
# ============================================================
# Configure SERVER_HOST and SERVER_PORT in .env.server
# Run from the server folder:
#   docker-compose -f docker-compose.server.yml up -d --build
# ============================================================

version: '2.4'

services:
  chatbot:
    build:
      context: ..
      dockerfile: server/Dockerfile.chatbot
    container_name: lego-chatbot
    ports:
      # Bind to the IP and port specified in .env.server
      - "${SERVER_HOST:-0.0.0.0}:${SERVER_PORT:-7860}:7860"
    volumes:
      - ../data:/app/data:ro
      - ../log:/app/log
      - ../pmmOutputs:/app/pmmOutputs
      - ../src/extractor_outputs:/app/src/extractor_outputs
      # Mount Docker socket to allow controlling sibling containers (for UPPAAL)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env.server
    environment:
      # Gradio settings
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=${SERVER_PORT:-7860}
    networks:
      - chatbot_network
    restart: unless-stopped
    # Resource limits for stability
    mem_limit: 8g
    mem_reservation: 4g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # UPPAAL Engine (required by chatbot)
  uppaal:
    image: uppaal-engine:latest
    container_name: uppaal-engine
    # Only expose internally, not to the outside world
    expose:
      - "2350"
    volumes:
      - ../data/automaton:/home/uppaal/models:ro
    env_file:
      - .env.server
    environment:
      - USER=uppaal
      - UPPAAL_LEASE=1
    networks:
      - chatbot_network
    restart: unless-stopped

  # Extractor service
  extractor:
    build:
      context: ../src/DTLogExtSim/Extractor
    container_name: extractor-service
    # Only expose internally
    expose:
      - "6662"
    volumes:
      - uploads:/app/uploads
      - download:/app/download
      - ../src/extractor_outputs:/app/extractor
    networks:
      - chatbot_network
    restart: unless-stopped

volumes:
  uploads:
  download:

networks:
  chatbot_network:
    driver: bridge
    internal: false
